name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java JDK 17 (diperlukan untuk kompilasi Android Gradle)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Set up Node.js v20
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 4. Instalasi dependensi Node.js
      - name: Install Dependencies
        run: npm ci || npm install

      # 5. Buat direktori www dan salin aset web statis ke dalamnya
      - name: Prepare Web Assets (www)
        run: |
          mkdir -p www
          cp index.html styles.css app.js www/
          echo "www directory contents:"
          ls -la www/

      # 6. Inisialisasi Platform Android Capacitor dan sinkronisasi aset
      - name: Add Android Platform and Sync
        run: |
          npx cap add android
          npx cap sync

      # 6b. Setel Aplikasi Android agar berjalan Fullscreen Immersive Natively & Bypass Notch Kamera
      - name: Configure Fullscreen Native Android Theme
        run: |
          node -e "
            const fs = require('fs');
            const files = [
              'android/app/src/main/res/values/styles.xml',
              'android/app/src/main/res/values-night/styles.xml'
            ];
            files.forEach(path => {
              if (fs.existsSync(path)) {
                let content = fs.readFileSync(path, 'utf8');
                let modified = false;
                if (!content.includes('android:windowFullscreen')) {
                  content = content.replace(
                    '<style name=\"AppTheme\" parent=\"BridgeTheme\">',
                    '<style name=\"AppTheme\" parent=\"BridgeTheme\">\n        <item name=\"android:windowFullscreen\">true</item>'
                  );
                  modified = true;
                }
                if (!content.includes('android:windowLayoutInDisplayCutoutMode')) {
                  content = content.replace(
                    '<style name=\"AppTheme\" parent=\"BridgeTheme\">',
                    '<style name=\"AppTheme\" parent=\"BridgeTheme\">\n        <item name=\"android:windowLayoutInDisplayCutoutMode\">shortEdges</item>'
                  );
                  modified = true;
                }
                if (modified) {
                  fs.writeFileSync(path, content, 'utf8');
                  console.log('Modified fullscreen & cutout layout theme for: ' + path);
                }
              }
            });
          "

      # 6c. Konfigurasi Ikon Aplikasi SOPI TV Menggunakan icon.jpeg
      - name: Generate and Configure App Icons
        run: |
          # Hapus folder adaptive icon agar sistem fallback ke png klasik
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          # Jalankan skrip pembantu untuk me-resize ikon
          python3 generate_icons.py

      # 7. Bangun APK menggunakan Gradle Wrapper di folder android
      - name: Build Android App (APK Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 8. Upload file APK hasil kompilasi sebagai berkas Artifact GitHub
      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SOPI-TV-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
